<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Updatarr — Retirement Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #151820;
      --border:   #232635;
      --accent:   #6c8eff;
      --accent2:  #ff6b6b;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --purple:   #a78bfa;
      --muted:    #4a5060;
      --text:     #c9cdd8;
      --text-dim: #6b7280;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

    header {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; font-family: var(--display); }
    .logo span { font-family: var(--display); font-size: 18px; font-weight: 800; color: var(--text); }
    .logo span span { color: var(--accent); }
    nav { display: flex; gap: 4px; }
    .nav-link { padding: 6px 14px; border-radius: 5px; font-size: 12px; font-weight: 600; color: var(--text-dim); text-decoration: none; font-family: var(--mono); transition: color 0.15s, background 0.15s; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent); background: rgba(108,142,255,0.1); }


    main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

    .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-family: var(--display); font-size: 24px; font-weight: 800; }
    .page-title span { color: var(--purple); }
    .queue-count { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    .toolbar-label { font-size: 11px; color: var(--text-dim); margin-right: 2px; }
    .sort-btn, .view-btn {
      padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-family: var(--mono);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover, .view-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,142,255,0.08); }
    .view-btn.active { border-color: var(--purple); color: var(--purple); background: rgba(167,139,250,0.08); }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .spacer { flex: 1; }
    .search-input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 12px;
      width: 220px; outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* Bulk actions bar */
    .bulk-bar {
      display: none; align-items: center; gap: 12px; padding: 10px 16px;
      background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.2);
      border-radius: 8px; margin-bottom: 16px;
    }
    .bulk-bar.visible { display: flex; }
    .bulk-count { font-size: 12px; color: var(--purple); font-weight: 600; }
    .btn-cancel-selected {
      padding: 5px 14px; border-radius: 5px; border: 1px solid rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08); color: var(--accent2); font-family: var(--mono);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel-selected:hover { background: rgba(255,107,107,0.15); border-color: var(--accent2); }
    .btn-deselect {
      padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-family: var(--mono);
      font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .btn-deselect:hover { color: var(--text); }

    /* ── Grid view ── */
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }

    .movie-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.2s; position: relative; cursor: pointer;
    }
    .movie-card:hover { border-color: rgba(108,142,255,0.4); transform: translateY(-2px); }
    .movie-card.urgent { border-color: rgba(255,107,107,0.3); }
    .movie-card.selected { border-color: var(--purple) !important; box-shadow: 0 0 0 2px rgba(167,139,250,0.2); }

    .select-checkbox {
      position: absolute; top: 8px; right: 8px; z-index: 10;
      width: 18px; height: 18px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: transparent; transition: all 0.15s;
      backdrop-filter: blur(4px);
    }
    .movie-card.selected .select-checkbox { background: var(--purple); border-color: var(--purple); color: #fff; }

    .poster-wrap { position: relative; aspect-ratio: 2/3; background: #0a0c10; overflow: hidden; }
    .poster-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .poster-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(160deg, #151820 0%, #0d0f14 100%); }
    .poster-placeholder-icon { font-size: 28px; opacity: 0.25; }
    .poster-placeholder-title { font-size: 10px; color: var(--text-dim); text-align: center; padding: 0 10px; line-height: 1.4; }

    .poster-badges { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
    .badge-4k { background: rgba(0,0,0,0.75); border: 1px solid rgba(167,139,250,0.5); color: var(--purple); font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; backdrop-filter: blur(4px); }
    .badge-action { background: rgba(0,0,0,0.75); font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; backdrop-filter: blur(4px); }
    .badge-action.redownload { border: 1px solid rgba(108,142,255,0.5); color: var(--accent); }
    .badge-action.reencode   { border: 1px solid rgba(251,191,36,0.5);  color: var(--yellow); }
    .badge-action.archive    { border: 1px solid rgba(74,222,128,0.5);  color: var(--green); }
    .badge-action.delete     { border: 1px solid rgba(255,107,107,0.5); color: var(--accent2); }
    .action-pill { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .action-pill.redownload { background: rgba(108,142,255,0.1); color: var(--accent); }
    .action-pill.reencode   { background: rgba(251,191,36,0.1);  color: var(--yellow); }
    .action-pill.archive    { background: rgba(74,222,128,0.1);  color: var(--green); }
    .action-pill.delete     { background: rgba(255,107,107,0.1); color: var(--accent2); }

    .countdown-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%); padding: 24px 10px 10px; display: flex; flex-direction: column; align-items: center; }
    .countdown-days { font-family: var(--display); font-size: 30px; font-weight: 800; line-height: 1; }
    .countdown-days.urgent { color: var(--accent2); }
    .countdown-days.soon   { color: var(--yellow); }
    .countdown-days.safe   { color: var(--green); }
    .countdown-label { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }
    .countdown-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .countdown-bar-fill { height: 100%; border-radius: 2px; }
    .countdown-bar-fill.urgent { background: var(--accent2); }
    .countdown-bar-fill.soon   { background: var(--yellow); }
    .countdown-bar-fill.safe   { background: var(--purple); }

    .card-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .card-title { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; flex-direction: column; gap: 3px; }
    .meta-row { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--text-dim); }
    .meta-label { color: var(--muted); }
    .profile-arrow { display: flex; align-items: center; gap: 3px; font-size: 10px; }
    .profile-from { color: var(--purple); }
    .profile-to { color: var(--green); }

    /* ── List view ── */
    .list-view { display: none; }
    .list-view.visible { display: block; }
    .list-table { width: 100%; border-collapse: collapse; }
    .list-table th { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .list-table td { padding: 10px 12px; border-bottom: 1px solid rgba(35,38,53,0.5); font-size: 12px; vertical-align: middle; }
    .list-table tr:last-child td { border-bottom: none; }
    .list-table tr:hover td { background: rgba(255,255,255,0.02); }
    .list-table tr.selected td { background: rgba(167,139,250,0.05); }
    .list-table tr.selected td:first-child { border-left: 2px solid var(--purple); padding-left: 10px; }
    .th-check, .td-check { width: 36px; text-align: center !important; padding: 8px !important; }
    .row-checkbox { width: 14px; height: 14px; accent-color: var(--purple); cursor: pointer; }
    .days-pill {
      display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; font-family: var(--display);
    }
    .days-pill.urgent { background: rgba(255,107,107,0.12); color: var(--accent2); }
    .days-pill.soon   { background: rgba(251,191,36,0.12);  color: var(--yellow); }
    .days-pill.safe   { background: rgba(167,139,250,0.12); color: var(--purple); }
    .profile-chip { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
    .ts { color: var(--text-dim); font-size: 11px; }
    .btn-row-cancel {
      padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(255,107,107,0.25);
      background: transparent; color: var(--accent2); font-family: var(--mono);
      font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-row-cancel:hover { background: rgba(255,107,107,0.1); border-color: var(--accent2); }

    /* Shared */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 0; color: var(--text-dim); }
    .empty-icon { font-size: 48px; opacity: 0.2; }
    .empty-title { font-family: var(--display); font-size: 18px; font-weight: 700; }
    .empty-sub { font-size: 12px; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.6; }

    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .skeleton-poster { aspect-ratio: 2/3; }
    .skeleton-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line { height: 11px; border-radius: 3px; }

    @media (max-width: 600px) {
      .movie-grid { grid-template-columns: repeat(2, 1fr); }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">↑</div>
    <span>Updat<span>arr</span></span>
  </a>
  <nav>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/queue" class="nav-link active">Queue</a>
    <a href="/settings" class="nav-link">Settings</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">Retirement <span>Queue</span></div>
      <div class="queue-count" id="queue-count">Loading...</div>
    </div>
  </div>

  <div class="toolbar">
    <span class="toolbar-label">Sort:</span>
    <button class="sort-btn active" id="sort-soonest" onclick="setSort('soonest')">Soonest</button>
    <button class="sort-btn" id="sort-latest" onclick="setSort('latest')">Latest</button>
    <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">A–Z</button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-label">View:</span>
    <button class="view-btn active" id="view-grid" onclick="setView('grid')">⊞ Grid</button>
    <button class="view-btn" id="view-list" onclick="setView('list')">☰ List</button>
    <div class="toolbar-sep"></div>
    <button class="sort-btn" id="btn-select-all" onclick="selectAll()">Select all</button>
    <button class="sort-btn" id="btn-deselect-all" onclick="deselectAll()">Deselect all</button>
    <div class="spacer"></div>
    <input class="search-input" type="text" placeholder="Search movies…" id="search-input" oninput="render()">
  </div>

  <div class="bulk-bar" id="bulk-bar">
    <span class="bulk-count" id="bulk-count">0 selected</span>
    <button class="btn-cancel-selected" onclick="cancelSelected()">Exclude from retirement queue</button>
  </div>

  <!-- Grid view -->
  <div class="movie-grid" id="grid-view">
    <div class="skeleton-card"><div class="skeleton-poster skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton" style="width:80%"></div><div class="skeleton-line skeleton" style="width:55%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-poster skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton" style="width:70%"></div><div class="skeleton-line skeleton" style="width:45%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-poster skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton" style="width:90%"></div><div class="skeleton-line skeleton" style="width:60%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-poster skeleton"></div><div class="skeleton-body"><div class="skeleton-line skeleton" style="width:65%"></div><div class="skeleton-line skeleton" style="width:50%"></div></div></div>
  </div>

  <!-- List view -->
  <div class="list-view" id="list-view"></div>

  <!-- Exclusions section -->
  <div id="exclusions-section" style="margin-top:48px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-family:var(--display);font-size:18px;font-weight:800;color:var(--text)">Exclusions</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:3px">Movies excluded from the retirement queue — won't be re-queued on future syncs</div>
      </div>
    </div>
    <div id="exclusions-list"></div>
  </div>
</main>

<script>
let _items = [];
let _sort = 'soonest';
let _view = 'grid';
let _selected = new Set();
const _posterCache = {};

function daysLeft(scheduledFor) {
  return Math.ceil((new Date(scheduledFor + 'Z') - Date.now()) / 86400000);
}
function urgClass(days) {
  return days <= 1 ? 'urgent' : days <= 3 ? 'soon' : 'safe';
}
function progressPct(queuedAt, scheduledFor) {
  const s = new Date(queuedAt + 'Z').getTime();
  const e = new Date(scheduledFor + 'Z').getTime();
  return Math.min(100, Math.max(0, ((Date.now() - s) / (e - s)) * 100));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'Z');
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function sorted(items) {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let r = q ? items.filter(i => i.movie_title.toLowerCase().includes(q)) : [...items];
  if (_sort === 'soonest') {
    r.sort((a, b) => {
      // Primary: execution date truncated to day
      const dayA = a.scheduled_for.slice(0, 10);
      const dayB = b.scheduled_for.slice(0, 10);
      if (dayA !== dayB) return dayA < dayB ? -1 : 1;
      // Secondary within same day: most recently added to Plex first
      const pa = a.plex_added_at ? a.plex_added_at.slice(0, 10) : '';
      const pb = b.plex_added_at ? b.plex_added_at.slice(0, 10) : '';
      return pb < pa ? -1 : pb > pa ? 1 : 0;
    });
  }
  if (_sort === 'latest')  r.sort((a, b) => b.scheduled_for.slice(0,10) < a.scheduled_for.slice(0,10) ? -1 : 1);
  if (_sort === 'alpha')   r.sort((a, b) => a.movie_title.localeCompare(b.movie_title));
  return r;
}

function setSort(s) {
  _sort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  render();
}

function setView(v) {
  _view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  render();
  loadExclusions();
}

function toggleSelect(id) {
  if (_selected.has(id)) _selected.delete(id);
  else _selected.add(id);
  updateBulkBar();
  render();
}

function selectAll() {
  sorted(_items).forEach(i => _selected.add(i.id));
  updateBulkBar();
  render();
}

function deselectAll() {
  _selected.clear();
  updateBulkBar();
  render();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const n = _selected.size;
  const items = sorted(_items);
  const allSelected = items.length > 0 && items.every(i => _selected.has(i.id));
  const noneSelected = n === 0;

  // Dim Select all when everything already selected, Deselect all when nothing selected
  const btnSelect = document.getElementById('btn-select-all');
  const btnDeselect = document.getElementById('btn-deselect-all');
  if (btnSelect)   { btnSelect.disabled = allSelected;   btnSelect.style.opacity   = allSelected   ? '0.35' : '1'; }
  if (btnDeselect) { btnDeselect.disabled = noneSelected; btnDeselect.style.opacity = noneSelected ? '0.35' : '1'; }

  if (n > 0) {
    bar.classList.add('visible');
    document.getElementById('bulk-count').textContent = `${n} selected`;
  } else {
    bar.classList.remove('visible');
  }
}

// ── Remove / Exclude ─────────────────────────────────────────────────────────
async function cancelSelected() {
  const ids = [..._selected];
  for (const id of ids) {
    await fetch(`/api/pending-downgrades/${id}/exclude`, { method: 'POST' });
    _items = _items.filter(i => i.id !== id);
  }
  _selected.clear();
  updateBulkBar();
  document.getElementById('queue-count').textContent = countLabel(_items.length);
  render();
  loadExclusions();
}

async function cancelOne(id) {
  await fetch(`/api/pending-downgrades/${id}/exclude`, { method: 'POST' });
  _items = _items.filter(i => i.id !== id);
  _selected.delete(id);
  updateBulkBar();
  document.getElementById('queue-count').textContent = countLabel(_items.length);
  render();
  loadExclusions();
}

// ── Exclusions ────────────────────────────────────────────────────────────────
async function loadExclusions() {
  const r = await fetch('/api/exclusions');
  const exclusions = await r.json();
  const el = document.getElementById('exclusions-list');
  if (!exclusions.length) {
    el.innerHTML = `<div style="padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-align:center;color:var(--text-dim);font-size:12px">No exclusions yet. Movies excluded from the queue will appear here and can be restored at any time.</div>`;
    return;
  }

  if (_view === 'list') {
    el.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
        <table class="list-table">
          <thead><tr><th>Movie</th><th>Action</th><th>Profile</th><th>Added to Plex</th><th></th></tr></thead>
          <tbody>
            ${exclusions.map(e => `
            <tr>
              <td style="font-weight:600;color:var(--text)">${e.movie_title}</td>
              <td><span class="action-pill ${e.action}">${actionLabel(e.action)}</span></td>
              <td><div class="profile-arrow" style="gap:5px">${profileArrow(e.current_profile, e.target_profile)}</div></td>
              <td class="ts">${e.plex_added_at ? fmtDate(e.plex_added_at) : '—'}</td>
              <td style="text-align:right"><button class="btn-row-cancel" style="color:var(--green);border-color:rgba(74,222,128,0.25)" onclick="restoreMovie(${e.id})">Move back to queue</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    return;
  }

  // Grid view — same poster cards, greyed out, with restore button
  el.innerHTML = `<div class="movie-grid" id="exclusions-grid">
    ${exclusions.map(e => `
    <div class="movie-card" id="excl-card-${e.id}" style="opacity:0.72;filter:grayscale(0.45)">
      <div class="poster-wrap">
        <div class="poster-placeholder" id="excl-ph-${e.id}">
          <div class="poster-placeholder-icon">🎬</div>
          <div class="poster-placeholder-title">${e.movie_title}</div>
        </div>
        <div class="poster-badges">
          <div class="badge-4k">4K</div>
          <div class="badge-action ${e.action}">${actionLabel(e.action)}</div>
        </div>
        <div class="countdown-overlay" style="padding:20px 10px 10px">
          <div style="font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.35);text-transform:uppercase">Excluded</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${e.movie_title}</div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="meta-label">Profile</span>
            <div class="profile-arrow">${profileArrow(e.current_profile, e.target_profile)}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">Added to Plex</span>
            <span>${e.plex_added_at ? fmtDate(e.plex_added_at) : '—'}</span>
          </div>
        </div>
        <button class="btn-row-cancel" style="margin-top:auto;width:100%;color:var(--green);border-color:rgba(74,222,128,0.25);padding:5px 0;text-align:center" onclick="restoreMovie(${e.id})">Move back to queue</button>
      </div>
    </div>`).join('')}
  </div>`;

  // Load posters async, reusing cache
  exclusions.forEach(async e => {
    const poster = _posterCache[e.tmdb_id] !== undefined
      ? _posterCache[e.tmdb_id]
      : await fetchPoster(e.tmdb_id);
    if (poster) {
      const ph = document.getElementById(`excl-ph-${e.id}`);
      if (ph) {
        ph.style.backgroundImage = `url(${poster})`;
        ph.style.backgroundSize = 'cover';
        ph.style.backgroundPosition = 'center';
        ph.innerHTML = '';
      }
    }
  });
}

async function restoreMovie(id) {
  await fetch(`/api/exclusions/${id}/restore`, { method: 'POST' });
  loadExclusions();
  // Also re-fetch queue in case it shows up back there
  const r = await fetch('/api/pending-downgrades');
  _items = await r.json();
  document.getElementById('queue-count').textContent = countLabel(_items.length);
  render();
}


function countLabel(n) {
  return n === 0 ? 'No movies queued' : `${n} movie${n === 1 ? '' : 's'} in retirement queue`;
}

function actionLabel(action) {
  return { redownload: 'Redownload', reencode: 'Reencode', archive: 'Archive', delete: 'Delete' }[action] || action;
}

function profileArrow(from, to) {
  if (to) return `<span class="profile-from">${from}</span><span style="color:var(--muted);margin:0 2px">→</span><span class="profile-to">${to}</span>`;
  return `<span class="profile-from">${from}</span>`;
}

function render() {
  const items = sorted(_items);
  const gridEl = document.getElementById('grid-view');
  const listEl = document.getElementById('list-view');

  gridEl.style.display = _view === 'grid' ? 'grid' : 'none';
  listEl.style.display = _view === 'list' ? 'block' : 'none';

  if (items.length === 0) {
    const empty = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-title">${_items.length === 0 ? 'Queue is empty' : 'No matches'}</div><div class="empty-sub">${_items.length === 0 ? 'No movies in the retirement queue. Run a sync to check your library.' : 'Try a different search term.'}</div></div>`;
    gridEl.innerHTML = empty;
    listEl.innerHTML = empty;
    return;
  }

  if (_view === 'grid') renderGrid(items, gridEl);
  else renderList(items, listEl);
}

function renderGrid(items, el) {
  el.innerHTML = items.map(item => {
    const days = daysLeft(item.scheduled_for);
    const urg  = urgClass(days);
    const pct  = progressPct(item.queued_at, item.scheduled_for);
    const poster = _posterCache[item.tmdb_id];
    const daysLabel = days <= 0 ? 'Due now' : days === 1 ? '1 day' : `${days} days`;
    const sel = _selected.has(item.id);
    const addedDate = item.plex_added_at ? fmtDate(item.plex_added_at) : '—';

    return `
    <div class="movie-card ${urg === 'urgent' ? 'urgent' : ''} ${sel ? 'selected' : ''}" id="card-${item.id}" onclick="toggleSelect(${item.id})">
      <div class="select-checkbox">${sel ? '✓' : ''}</div>
      <div class="poster-wrap">
        ${poster ? `<img class="poster-img" src="${poster}" alt="${item.movie_title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="poster-placeholder" style="${poster ? 'display:none' : ''}">
          <div class="poster-placeholder-icon">🎬</div>
          <div class="poster-placeholder-title">${item.movie_title}</div>
        </div>
        <div class="poster-badges">
          <div class="badge-4k">4K</div>
          <div class="badge-action ${item.action}">${actionLabel(item.action)}</div>
        </div>
        <div class="countdown-overlay">
          <div class="countdown-days ${urg}">${days <= 0 ? '!' : days}</div>
          <div class="countdown-label">${daysLabel}</div>
          <div class="countdown-bar"><div class="countdown-bar-fill ${urg}" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${item.movie_title}</div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="meta-label">Profile</span>
            <div class="profile-arrow">${profileArrow(item.current_profile, item.target_profile)}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">Added to Plex</span>
            <span>${addedDate}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Executes</span>
            <span style="color:var(--purple)">${fmtDate(item.scheduled_for)}</span>
          </div>
        </div>
        <button class="btn-row-cancel" style="margin-top:auto;width:100%;padding:5px 0;text-align:center" onclick="event.stopPropagation();cancelOne(${item.id})">Exclude</button>
      </div>
    </div>`;
  }).join('');
}

function renderList(items, el) {
  const allSelected = items.length > 0 && items.every(i => _selected.has(i.id));
  el.innerHTML = `
    <table class="list-table">
      <thead>
        <tr>
          <th class="th-check"><input type="checkbox" class="row-checkbox" ${allSelected ? 'checked' : ''} onchange="toggleAll(this.checked)" title="Select all"></th>
          <th>Movie</th>
          <th>Action</th>
          <th>Profile</th>
          <th>Added to Plex</th>
          <th>Executes</th>
          <th>Days left</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${items.map(item => {
          const days = daysLeft(item.scheduled_for);
          const urg  = urgClass(days);
          const sel  = _selected.has(item.id);
          const daysLabel = days <= 0 ? 'Due now' : days + 'd';
          const addedDate = item.plex_added_at ? fmtDate(item.plex_added_at) : '—';
          return `
          <tr class="${sel ? 'selected' : ''}" onclick="toggleSelect(${item.id})" style="cursor:pointer">
            <td class="td-check" onclick="event.stopPropagation()"><input type="checkbox" class="row-checkbox" ${sel ? 'checked' : ''} onchange="toggleSelect(${item.id})"></td>
            <td style="font-weight:600;color:var(--text)">${item.movie_title}</td>
            <td><span class="action-pill ${item.action}">${actionLabel(item.action)}</span></td>
            <td><div class="profile-arrow" style="gap:5px">${profileArrow(item.current_profile, item.target_profile)}</div></td>
            <td class="ts">${addedDate}</td>
            <td class="ts" style="color:var(--purple)">${fmtDate(item.scheduled_for)}</td>
            <td><span class="days-pill ${urg}">${daysLabel}</span></td>
            <td onclick="event.stopPropagation()"><button class="btn-row-cancel" onclick="cancelOne(${item.id})">Exclude</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function toggleAll(checked) {
  const items = sorted(_items);
  if (checked) items.forEach(i => _selected.add(i.id));
  else items.forEach(i => _selected.delete(i.id));
  updateBulkBar();
  render();
}

async function fetchPoster(tmdbId) {
  if (_posterCache[tmdbId] !== undefined) return _posterCache[tmdbId];
  const url = `/api/tmdb-poster/${tmdbId}`;
  try {
    const r = await fetch(url);
    const ct = r.headers.get('content-type') || '';
    _posterCache[tmdbId] = (r.ok && ct.startsWith('image/')) ? url : null;
  } catch { _posterCache[tmdbId] = null; }
  return _posterCache[tmdbId];
}

async function loadPosters() {
  for (const item of _items) {
    await fetchPoster(item.tmdb_id);
  }
  if (_view === 'grid') render();
}

async function load() {
  try {
    const r = await fetch('/api/pending-downgrades');
    _items = await r.json();
    document.getElementById('queue-count').textContent = countLabel(_items.length);
    render();
    loadPosters();
  } catch(e) {
    document.getElementById('queue-count').textContent = 'Failed to load';
    document.getElementById('grid-view').innerHTML = `<div class="empty-state"><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

load();
loadExclusions();
</script>
</body>
</html>
